<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IET Project</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 500px; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .nav-links { margin: 20px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        a { text-decoration: none; color: #3498db; font-weight: bold; margin: 0 10px; transition: 0.3s; }
        
        /* Style Tambahan untuk Report */
        .report-section { text-align: left; margin-top: 20px; }
        form input, form textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
        .btn { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        .item { border-bottom: 1px solid #eee; padding: 10px 0; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Selamat Datang di Kabupaten Lamsel</h1> 
        <p>Aplikasi Utama (<strong>Reynaldo</strong>)</p>
        
        <div class="nav-links">
            <a href="/about/">About</a>
            <a href="/contacts/">Contacts</a>
        </div>

        <div class="report-section">
            <h3>📢 Kirim Laporan</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn">Simpan Laporan</button>
            </form>
        </div>

        <div class="report-section">
            <h3>📋 Daftar Laporan</h3>
            {% for report in reports %}
                <div class="item">
                    <strong>{{ report.title }}</strong> - <small>{{ report.status }}</small>
                    <p style="margin: 5px 0; font-size: 0.9em;">{{ report.description }}</p>
                </div>
            {% empty %}
                <p>Belum ada laporan.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
