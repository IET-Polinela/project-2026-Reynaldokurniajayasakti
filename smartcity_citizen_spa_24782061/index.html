<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
        .border-dashed { border: 2px dashed #dee2e6 !important; }
        .sidebar-menu .active { background-color: #0d6efd !important; color: white !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <template id="login-template">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-4">
                
                <div class="card shadow-sm border-0 rounded-3" id="login-container">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                            <h4 class="fw-bold mt-2">Masuk ke Portal</h4>
                            <p class="text-muted small">Gunakan akun warga atau admin Anda</p>
                        </div>
                        <div id="login-alert"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginUsername" class="form-label small fw-bold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" id="loginUsername" placeholder="Masukkan username" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="loginPassword" class="form-label small fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" id="loginPassword" placeholder="Masukkan password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" id="btnLogin">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
                            </button>
                            <div class="text-center mt-3">
                                <p class="small text-muted mb-0">Belum punya akun warga? <a href="#" id="link-to-register" class="text-decoration-none fw-bold">Daftar Sekarang</a></p>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm border-0 rounded-3" id="register-container" style="display: none;">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus-fill text-success" style="font-size: 3rem;"></i>
                            <h4 class="fw-bold mt-2">Registrasi Warga</h4>
                            <p class="text-muted small">Buat akun untuk mulai melaporkan masalah kota</p>
                        </div>
                        <div id="register-alert"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="regUsername" class="form-label small fw-bold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" id="regUsername" placeholder="Buat username baru" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="regEmail" class="form-label small fw-bold">Alamat Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" id="regEmail" placeholder="nama@email.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="regPassword" class="form-label small fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" id="regPassword" placeholder="Buat password aman" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm" id="btnRegister">
                                <i class="bi bi-person-check me-2"></i>Daftar Akun
                            </button>
                            <div class="text-center mt-3">
                                <p class="small text-muted mb-0">Sudah memiliki akun? <a href="#" id="link-to-login" class="text-decoration-none fw-bold">Masuk di sini</a></p>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </template>

    <template id="dashboard-template">
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="d-grid gap-2 mb-4">
                    <button class="btn btn-primary fw-bold py-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#reportModal">
                        <i class="bi bi-plus-circle me-2"></i>Laporan Baru
                    </button>
                </div>
                
                <div class="list-group sidebar-menu shadow-sm border-0 rounded-3 mb-4">
                    <a href="#dashboard" class="list-group-item list-group-item-action p-3 fw-bold border-0 active" id="tabFeedKota">
                        <i class="bi bi-rss me-2"></i>Feed Kota (Semua)
                    </a>
                    <a href="#dashboard" class="list-group-item list-group-item-action p-3 fw-bold border-0 text-dark" id="tabLaporanSaya">
                        <i class="bi bi-person-bounding-box me-2"></i>Laporan Saya
                    </a>
                </div>

                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-3">
                        <h6 class="fw-bold mb-3 border-bottom pb-2 text-secondary">Status Laporan Saya</h6>
                        <div class="d-flex justify-content-between align-items-center mb-2 small">
                            <span><i class="bi bi-file-earmark-text text-warning me-2"></i>Draft</span>
                            <span class="badge bg-warning rounded-pill px-2 text-dark fw-bold" id="counterDraft">0</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2 small">
                            <span><i class="bi bi-gear-wide-connected text-info me-2"></i>Diproses</span>
                            <span class="badge bg-info rounded-pill px-2 text-dark fw-bold" id="counterDiproses">0</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center small">
                            <span><i class="bi bi-check-circle text-success me-2"></i>Selesai</span>
                            <span class="badge bg-success rounded-pill px-2 fw-bold" id="counterSelesai">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div id="error-alert-container"></div>
                <div id="feed-reports-container" class="d-flex flex-column gap-3"></div>
            </div>

            <div class="col-md-3">
                <div class="card border-0 shadow-sm rounded-3 bg-white">
                    <div class="card-body p-3">
                        <h6 class="fw-bold text-dark d-flex align-items-center">
                            <i class="bi bi-info-circle-fill text-primary me-2"></i>Informasi Wilayah
                        </h6>
                        <p class="text-muted small mb-0 lh-base">
                            Menampilkan data laporan real-time yang tersinkronisasi langsung dengan server Django Port 8014.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="reportModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg rounded-3">
                    <div class="modal-header bg-primary text-white py-3">
                        <h5 class="modal-title fw-bold" id="reportModalLabel">
                            <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="reportForm">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label for="reportTitle" class="form-label small fw-bold">Judul Masalah / Laporan</label>
                                <input type="text" class="form-control" id="reportTitle" required placeholder="Contoh: Lampu jalan mati">
                            </div>
                            <div class="mb-3">
                                <label for="reportCategory" class="form-label small fw-bold">Kategori Fasilitas</label>
                                <select class="form-select text-dark" id="reportCategory" required>
                                    <option value="" disabled selected>-- Pilih Kategori --</option>
                                    <option value="kebersihan">Kebersihan</option>
                                    <option value="keamanan">Keamanan</option>
                                    <option value="infrastruktur">Infrastruktur</option>
                                    <option value="lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="reportLocation" class="form-label small fw-bold">Lokasi Kejadian</label>
                                <input type="text" class="form-control" id="reportLocation" required placeholder="Nama jalan, RT/RW atau nama fasilitas">
                            </div>
                            <div class="mb-3">
                                <label for="reportDescription" class="form-label small fw-bold">Deskripsi Kronologi Lengkap</label>
                                <textarea class="form-control" id="reportDescription" rows="4" required placeholder="Jelaskan secara rinci permasalahan fasilitas di lapangan..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer bg-light py-2">
                            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
                            <button type="button" class="btn btn-warning btn-sm fw-bold text-dark" id="btnSaveDraft">Simpan sebagai Draft</button>
                            <button type="submit" class="btn btn-primary btn-sm fw-bold" id="btnSubmitReport">Kirim Laporan</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
