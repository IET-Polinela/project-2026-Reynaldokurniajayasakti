<!DOCTYPE html>
<html>
<head>
    <title>Tambah Laporan - Smart City</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; }
        input, textarea, select { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Buat Laporan Permasalahan Kota</h2>
        <form method="POST">
            {% csrf_token %} {{ form.as_p }} <button type="submit">Simpan Laporan</button>
        </form>
        <br>
        <a href="{% url 'home' %}">Batal</a>
    </div>
</body>
</html>
